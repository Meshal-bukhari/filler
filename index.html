<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facial Injection Procedural Planner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#f5f5f0;color:#222;line-height:1.5;padding:10px}
h1{font-size:1.4em;padding:10px 0;border-bottom:2px solid #333}
h2{font-size:1.2em;margin:15px 0 8px;color:#1a5276;border-left:4px solid #1a5276;padding-left:8px}
h3{font-size:1.05em;margin:12px 0 5px;color:#333}
h4{font-size:0.95em;margin:8px 0 4px;color:#555}
.container{max-width:1100px;margin:0 auto}
.section{background:#fff;border:1px solid #ccc;border-radius:6px;padding:12px;margin:10px 0}
.checklist{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:6px}
.checklist label{display:flex;align-items:flex-start;gap:6px;padding:5px 8px;border:1px solid #ddd;border-radius:4px;cursor:pointer;font-size:0.88em;background:#fafafa}
.checklist label:hover{background:#eef5ff}
.checklist input{margin-top:3px;flex-shrink:0}
.region-title{font-weight:700;font-size:0.95em;color:#1a5276;padding:6px 0 3px;grid-column:1/-1;border-bottom:1px solid #ddd;margin-top:6px}
#generateBtn{background:#1a5276;color:#fff;border:none;padding:12px 30px;font-size:1em;border-radius:6px;cursor:pointer;margin:10px 0}
#generateBtn:hover{background:#154360}
#clearBtn{background:#aaa;color:#fff;border:none;padding:8px 20px;font-size:0.9em;border-radius:6px;cursor:pointer;margin:10px}
#clearBtn:hover{background:#888}
#output{margin-top:15px}
.plan-card{background:#fff;border:1px solid #bbb;border-radius:6px;padding:14px;margin:12px 0}
.plan-card h2{margin-top:0}
.danger{color:#c0392b;font-weight:600}
.pearl{background:#fffde7;border-left:3px solid #f9a825;padding:6px 10px;margin:6px 0;font-size:0.9em}
.safety{background:#ffebee;border-left:3px solid #c62828;padding:6px 10px;margin:6px 0;font-size:0.9em}
table{width:100%;border-collapse:collapse;margin:8px 0;font-size:0.88em}
table th,table td{border:1px solid #ccc;padding:5px 8px;text-align:left}
table th{background:#f0f0f0;font-weight:600}
.seq-note{background:#e8f5e9;border-left:3px solid #2e7d32;padding:8px 10px;margin:8px 0;font-size:0.9em}
.product-box{background:#f3e5f5;border-left:3px solid #7b1fa2;padding:6px 10px;margin:6px 0;font-size:0.9em}
ul{margin:4px 0 4px 18px}
li{margin:2px 0;font-size:0.9em}
.summary-bar{background:#1a5276;color:#fff;padding:10px 14px;border-radius:6px;margin:10px 0;font-size:0.95em}
#sequenceOrder{margin:10px 0}
#sequenceOrder ol{margin-left:20px}
#sequenceOrder li{padding:2px 0}
.collapsible{cursor:pointer;user-select:none}
.collapsible::before{content:'▸ ';font-weight:700}
.collapsible.open::before{content:'▾ '}
.coll-body{display:none;padding-left:10px}
.coll-body.show{display:block}
@media print{body{padding:0;font-size:11px}.checklist,.section:first-of-type,#generateBtn,#clearBtn{display:none}h1{font-size:1.2em}}
</style>
</head>
<body>
<div class="container">
<h1>🔬 Facial Injection Procedural Planner</h1>
<p style="font-size:0.85em;color:#555;padding:4px 0">Check patient concerns / examination findings → Generate procedural plan. For physician use only.</p>

<div class="section">
<h2 style="border:none;margin:0 0 8px;padding:0">Patient Concerns & Examination Findings</h2>
<div class="checklist" id="checklist">

<div class="region-title">🔷 Upper Face</div>
<label><input type="checkbox" value="temple_hollowing"> Temporal hollowing / skeletonized temples</label>
<label><input type="checkbox" value="brow_ptosis"> Brow tail ptosis / upper lid sulcus hollowing</label>

<div class="region-title">🔷 Periorbital / Midface</div>
<label><input type="checkbox" value="tear_trough"> Tear trough / nasojugal groove</label>
<label><input type="checkbox" value="pmg"> Palpebromalar groove (PMG)</label>
<label><input type="checkbox" value="malar_mound"> Malar mounds / festoons</label>
<label><input type="checkbox" value="negative_vector"> Negative lower eyelid vector</label>
<label><input type="checkbox" value="midface_deflation"> Midface deflation / flat cheek / lost Ogee curve</label>
<label><input type="checkbox" value="lid_cheek_blurring"> Lid-cheek junction blurring / V-deformity</label>
<label><input type="checkbox" value="midcheek_groove"> Midcheek groove ("Indian bands")</label>
<label><input type="checkbox" value="scleral_show"> Scleral show</label>

<div class="region-title">🔷 Nasolabial / Pyriform</div>
<label><input type="checkbox" value="nlf"> Nasolabial folds (NLF)</label>
<label><input type="checkbox" value="pyriform_depression"> Pyriform depression / alar base retrusion</label>

<div class="region-title">🔷 Lips & Perioral</div>
<label><input type="checkbox" value="lip_volume"> Lip volume loss / thin lips</label>
<label><input type="checkbox" value="vermilion_border"> Vermilion border effacement</label>
<label><input type="checkbox" value="philtral_columns"> Philtral column splaying</label>
<label><input type="checkbox" value="cupids_bow"> Cupid's bow flattening</label>
<label><input type="checkbox" value="lip_inversion"> Lip inversion / loss of incisor show</label>
<label><input type="checkbox" value="roorf_deficit"> Upper lip skeletal deficit (ROOrF indication)</label>
<label><input type="checkbox" value="barcode_lines"> Perioral barcode lines (smoker lines)</label>
<label><input type="checkbox" value="oral_commissure"> Oral commissure ptosis (downturned corners)</label>
<label><input type="checkbox" value="gummy_smile"> Gummy smile</label>

<div class="region-title">🔷 Lower Face</div>
<label><input type="checkbox" value="marionette_lines"> Marionette lines (melomental folds)</label>
<label><input type="checkbox" value="chin_retrogenia"> Retrogenia (recessed chin)</label>
<label><input type="checkbox" value="mentalis_strain"> Mentalis strain / chin dimpling</label>
<label><input type="checkbox" value="labiomental_crease"> Deep labiomental crease</label>
<label><input type="checkbox" value="prejowl"> Prejowl sulcus</label>
<label><input type="checkbox" value="jowling"> Jowling / mandibular contour loss</label>
<label><input type="checkbox" value="jawline"> Jawline definition loss / mandibular border</label>

</div>
<div style="margin-top:12px">
<button id="generateBtn" onclick="generatePlan()">Generate Procedural Plan</button>
<button id="clearBtn" onclick="clearAll()">Clear All</button>
</div>
</div>

<div id="output"></div>
</div>

<script>
function clearAll(){
document.querySelectorAll('#checklist input').forEach(c=>c.checked=false);
document.getElementById('output').innerHTML='';
}

function generatePlan(){
const checked = [...document.querySelectorAll('#checklist input:checked')].map(c=>c.value);
if(!checked.length){alert('Please select at least one concern.');return;}

let html = '';

// Determine sequence
const items = checked.map(k=>({key:k,...DATA[k]})).filter(x=>x.title);
items.sort((a,b)=>(a.sequencePriority||5)-(b.sequencePriority||5));

// Summary
html += `<div class="summary-bar">📋 <b>Plan generated for ${items.length} concern(s)</b>. Organized by treatment sequence (foundation → contour → refinement).</div>`;

// Global sequence note
const hasMidface = checked.some(k=>['midface_deflation','lid_cheek_blurring','midcheek_groove','nlf','tear_trough','pmg','malar_mound','negative_vector','scleral_show','pyriform_depression'].includes(k));
const hasLowerFace = checked.some(k=>['chin_retrogenia','prejowl','jawline','jowling','marionette_lines','mentalis_strain','labiomental_crease'].includes(k));
const hasLips = checked.some(k=>['lip_volume','vermilion_border','philtral_columns','cupids_bow','lip_inversion','roorf_deficit','barcode_lines','oral_commissure','gummy_smile'].includes(k));
const hasTemple = checked.some(k=>['temple_hollowing','brow_ptosis'].includes(k));

html += `<div class="seq-note"><b>🔄 Treatment Sequence (Waldorf / Top-Down Logic):</b><ol>`;
if(hasMidface) html += `<li><b>Midface foundation</b> — cheeks, SOOF, DMCF, prezygomatic space (addresses upward vectors, reduces pseudoptosis)</li>`;
if(hasTemple) html += `<li><b>Temple contouring</b> — follows midface foundation</li>`;
if(hasLowerFace) html += `<li><b>Lower face structure</b> — chin projection → prejowl → jawline (after midface is supported)</li>`;
if(hasLips) html += `<li><b>Lips & perioral</b> — assess skeletal support (ROOrF) before direct lip work</li>`;
html += `</ol></div>`;

// Cards
items.forEach(item=>{
html += `<div class="plan-card">
<h2>${item.title}</h2>
<div class="seq-note" style="margin-bottom:10px">⏱ <b>Sequence:</b> ${item.sequenceNote}</div>

<h3 class="collapsible" onclick="toggleColl(this)">Indications</h3>
<div class="coll-body show">${item.indications}</div>

<h3 class="collapsible open" onclick="toggleColl(this)">Target Compartments</h3>
<div class="coll-body show">${item.targetCompartments}</div>

<h3 class="collapsible open" onclick="toggleColl(this)">How to Reach (Technique)</h3>
<div class="coll-body show">${item.howToReach}</div>

<h3 class="collapsible open" onclick="toggleColl(this)">Vessels & Danger Zones</h3>
<div class="coll-body show"><div class="safety">${item.vessels}</div></div>

<h3 class="collapsible open" onclick="toggleColl(this)">Avoidance Strategies</h3>
<div class="coll-body show">${item.avoidance}</div>

<h3 class="collapsible open" onclick="toggleColl(this)">Products</h3>
<div class="coll-body show"><div class="product-box">${item.products}</div></div>

<h3 class="collapsible open" onclick="toggleColl(this)">Volumes</h3>
<div class="coll-body show">${item.volumes}</div>

<h3 class="collapsible open" onclick="toggleColl(this)">Expected Outcomes</h3>
<div class="coll-body show">${item.outcomes}</div>

<h3 class="collapsible open" onclick="toggleColl(this)">Clinical Pearls</h3>
<div class="coll-body show"><div class="pearl">${item.pearls}</div></div>
</div>`;
});

// Product summary table
const productMap = {};
items.forEach(item=>{
const text = item.products + ' ' + (item.volumes||'');
['Voluma','Radiesse','Restylane Lyft','Restylane Silk','Teosyal Ultra Deep','Teosyal RHA 4','RHA 4','RHA 3','RHA 2','Volbella','Redensity 2','Restylane Kysse','Juvéderm Ultra'].forEach(p=>{
if(text.includes(p)){
if(!productMap[p]) productMap[p]=[];
productMap[p].push(item.title);
}
});
});
if(Object.keys(productMap).length){
html += `<div class="plan-card"><h2>Product Summary</h2><table><tr><th>Product</th><th>Used For</th></tr>`;
Object.entries(productMap).forEach(([prod,areas])=>{
html += `<tr><td><b>${prod}</b></td><td>${areas.join(', ')}</td></tr>`;
});
html += `</table></div>`;
}

document.getElementById('output').innerHTML = html;
document.getElementById('output').scrollIntoView({behavior:'smooth'});
}

function toggleColl(el){
el.classList.toggle('open');
const body = el.nextElementSibling;
body.classList.toggle('show');
}
</script>
